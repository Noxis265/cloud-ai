<!DOCTYPE html>
<html>
<body>
    <div id="chat-window"></div>
    <input id="user-input" type="text">
    <button onclick="sendMessage()">Отправить</button>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat-window');
            const KEY = "AQ.Ab8RN6LUnf2fNaxOPHitySCZbLGfeEoxJAVFNcM5f5bQDgdDqw"; // Твой новый ключ
            
            const text = input.value;
            chat.innerHTML += "<div>" + text + "</div>";
            input.value = '';

            try {
                // Используем правильный endpoint
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                
                if (data.candidates) {
                    chat.innerHTML += "<div>" + data.candidates[0].content.parts[0].text + "</div>";
                } else {
                    console.log(data); // Посмотри в консоль (F12), если опять ошибка
                    chat.innerHTML += "<div style='color:red'>Ошибка: проверьте консоль</div>";
                }
            } catch (error) {
                chat.innerHTML += "<div style='color:red'>Ошибка сети</div>";
            }
        }
    </script>
</body>
</html>
