<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudAI</title>
    <style>
        /* Современный темный стиль */
        body { margin: 0; background: #0b0f19; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 18px; border-radius: 18px; max-width: 75%; background: #1e293b; line-height: 1.5; }
        .user-msg { background: #3b82f6; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background: #2d3748; align-self: flex-start; border-bottom-left-radius: 4px; }
        #input-area { padding: 20px; background: #111827; border-top: 1px solid #1f2937; display: flex; gap: 10px; }
        input { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid #374151; background: #1f2937; color: white; outline: none; }
        button { padding: 10px 20px; border-radius: 10px; background: #3b82f6; border: none; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div id="chat-window">
        <div class="message ai-msg">Привет! Я готов к работе. Что тебя интересует?</div>
    </div>
    <div id="input-area">
        <input id="user-input" placeholder="Введите ваш запрос..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Отправить</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat-window');
            const text = input.value.trim();
            if (!text) return;

            chat.innerHTML += `<div class="message user-msg">${text}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            // Вставь сюда свой рабочий ключ
            const KEY = "AQ.Ab8RN6IvMOP03nY0iLLr5SxzfrGa9PzePCu3Yz0uLPIqxgIuRA";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    const reply = data.candidates[0].content.parts[0].text;
                    chat.innerHTML += `<div class="message ai-msg">${reply}</div>`;
                } else {
                    chat.innerHTML += `<div class="message ai-msg" style="color: #f87171;">Ошибка: ${data.error?.message || 'Не удалось получить ответ'}</div>`;
                }
            } catch (e) {
                chat.innerHTML += `<div class="message ai-msg" style="color: #f87171;">Ошибка сети</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
