<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CloudAI</title>
    <style>
        body { margin: 0; background: #0b0f19; color: #e2e8f0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 18px; border-radius: 18px; max-width: 75%; background: #2d3748; }
        .user-msg { background: #3b82f6; align-self: flex-end; }
        #input-area { padding: 20px; background: #111827; display: flex; gap: 10px; }
        input { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid #374151; background: #1f2937; color: white; outline: none; }
        button { padding: 10px 20px; border-radius: 10px; background: #3b82f6; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-window"><div class="message">Привет! Чем могу помочь?</div></div>
    <div id="input-area">
        <input id="user-input" placeholder="Введите ваш запрос...">
        <button id="send-btn">Отправить</button>
    </div>
    <script>
        // Твой API ключ должен быть в переменной окружения Vercel
        const API_KEY = "GEMINI_API_KEY_HERE"; 

        document.getElementById('send-btn').addEventListener('click', async () => {
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat-window');
            const text = input.value.trim();
            if (!text) return;
            
            chat.innerHTML += `<div class="message user-msg">${text}</div>`;
            input.value = '';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="message">${aiText}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="message" style="color:red">Ошибка: ${e.message}</div>`;
            }
        });
    </script>
</body>
</html>
