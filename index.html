<script>
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const chat = document.getElementById('chat-window');
        const text = input.value.trim();
        if (!text) return;

        chat.innerHTML += `<div class="message user-msg">${text}</div>`;
        input.value = '';

        // ВАЖНО: Вставь сюда БЕЗ ПРОБЕЛОВ и лишних символов
        const KEY = "AQ.Ab8RN6Jes3CxQODlLYw3wTy2rPngjn9TYVfvbmTGtpmxHprXyA";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ role: "user", parts: [{ text: text }] }]
                })
            });

            const data = await response.json();
            
            if (data.candidates) {
                chat.innerHTML += `<div class="message ai-msg">${data.candidates[0].content.parts[0].text}</div>`;
            } else {
                console.log("Полный ответ сервера:", data);
                chat.innerHTML += `<div class="message ai-msg" style="color:red">Ошибка: ${data.error ? data.error.message : 'Неизвестная ошибка'}</div>`;
            }
        } catch (e) {
            chat.innerHTML += `<div class="message ai-msg" style="color:red">Ошибка сети: ${e.message}</div>`;
        }
    }
</script>
