<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudAI</title>
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 15px; border-radius: 12px; max-width: 80%; line-height: 1.5; }
        .user-msg { background: #3b82f6; align-self: flex-end; }
        .ai-msg { background: #1e293b; align-self: flex-start; border: 1px solid #334155; }
        #input-area { padding: 20px; background: #1e293b; display: flex; gap: 10px; border-top: 1px solid #334155; }
        input { flex: 1; padding: 15px; font-size: 16px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; }
        button { padding: 15px 25px; font-size: 16px; border-radius: 8px; background: #3b82f6; border: none; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="chat-window">
        <div class="message ai-msg">Привет! Я CloudAI. Спрашивай о чем угодно.</div>
    </div>
    
    <div id="input-area">
        <input id="user-input" placeholder="Введите ваш запрос..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Отправить</button>
    </div>

<script>
    // Твой ключ (создай новый в Google AI Studio, так как этот уже засвечен!)
    const API_KEY = "AQ.Ab8RN6L8CrNASOA_FB8PanFVJRFqTHkBZFjPFthJzB1deZvq3A";

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const chat = document.getElementById('chat-window');
        const text = input.value.trim();
        
        if (!text) return;

        chat.innerHTML += `<div class="message user-msg">${text}</div>`;
        input.value = '';
        chat.scrollTop = chat.scrollHeight;

        try {
            // Используем метод URLSearchParams для безопасной передачи ключа
            const url = new URL("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent");
            url.searchParams.append("key", API_KEY);

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: text }] }] 
                })
            });

            const data = await response.json();
            
            // Проверяем ответ
            if (data.candidates && data.candidates[0].content) {
                const aiText = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="message ai-msg">${aiText}</div>`;
            } else {
                console.error("Ответ API:", data); // Поможет увидеть ошибку в консоли
                throw new Error("API вернул странный ответ");
            }
        } catch (error) {
            chat.innerHTML += `<div class="message ai-msg" style="color: #f87171;">Ошибка: ${error.message}</div>`;
        }
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
